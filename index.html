<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LIVING PLUS | ใบแจ้งหนี้ / ใบเสร็จ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --maroon:#6B1220;
    --maroon-deep:#4A0C16;
    --maroon-soft:#8C2233;
    --cream:#FFFFFF;
    --paper:#FDFBFA;
    --ink:#241417;
    --ink-soft:#6b5a5d;
    --line:#E7DCDA;
    --line-soft:#F1E8E7;
    --danger:#B23A2E;
    --radius:2px;
    --font-body-th:'Noto Sans Thai',sans-serif;
    --font-body-en:'Inter',sans-serif;
    --font-body-zh:'Noto Sans SC',sans-serif;
    --font-disp-th:'Noto Serif Thai',serif;
    --font-disp-en:'Playfair Display',serif;
    --font-disp-zh:'Noto Serif SC',serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#F4EFED;
    color:var(--ink);
    font-family:var(--font-body-th),var(--font-body-en);
    -webkit-font-smoothing:antialiased;
  }
  body.lang-en{font-family:var(--font-body-en),var(--font-body-th);}
  body.lang-zh{font-family:var(--font-body-zh),var(--font-body-en);}

  /* ---------- Topbar ---------- */
  .topbar{
    background:var(--maroon-deep);
    color:#fff;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:3px solid var(--maroon-soft);
  }
  .brandmark{display:flex;align-items:center;gap:12px;}
  .brandmark .seal{
    width:38px;height:38px;border-radius:50%;
    border:1.4px solid rgba(255,255,255,.75);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-disp-en);font-weight:700;font-size:13px;
    letter-spacing:1px;
    position:relative;
  }
  .brandmark .seal::before{
    content:"";position:absolute;inset:3px;border:1px solid rgba(255,255,255,.4);border-radius:50%;
  }
  .brandmark .word{
    font-family:var(--font-disp-en);
    font-weight:700;
    font-size:17px;
    letter-spacing:.5px;
  }
  .brandmark .word small{
    display:block;
    font-family:var(--font-body-th);
    font-weight:400;
    font-size:11px;
    letter-spacing:1.5px;
    opacity:.75;
    text-transform:uppercase;
  }
  .topbar-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .seg{
    display:flex;background:rgba(255,255,255,.08);border-radius:999px;padding:3px;
  }
  .seg button{
    border:none;background:transparent;color:#fff;opacity:.65;
    padding:7px 13px;border-radius:999px;font-size:12.5px;cursor:pointer;
    font-family:inherit;font-weight:600;transition:.15s;white-space:nowrap;
  }
  .seg button.active{background:#fff;color:var(--maroon-deep);opacity:1;}

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:minmax(340px,440px) 1fr;
    gap:0;
    align-items:start;
  }
  @media (max-width:980px){
    .layout{grid-template-columns:1fr;}
  }
  .form-pane{
    padding:28px;
    max-height:calc(100vh - 76px);
    overflow-y:auto;
    position:sticky;
    top:76px;
  }
  @media (max-width:980px){
    .form-pane{position:static;max-height:none;}
  }
  .preview-pane{
    padding:36px 28px 80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    width:100%;
  }
  .preview-scale-box{
    width:100%;
    display:flex;
    justify-content:center;
  }

  /* ---------- Form ---------- */
  .card{
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 20px 22px;
    margin-bottom:16px;
  }
  .card h3{
    margin:0 0 14px;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--maroon);
    font-weight:700;
    display:flex;align-items:center;gap:8px;
  }
  .card h3::before{
    content:"";width:14px;height:1.5px;background:var(--maroon);display:inline-block;
  }
  label{
    display:block;font-size:12px;color:var(--ink-soft);margin:10px 0 4px;font-weight:600;
  }
  label:first-child{margin-top:0;}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:var(--radius);
    font-size:14px;font-family:inherit;color:var(--ink);background:#fff;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--maroon-soft);outline-offset:1px;border-color:var(--maroon-soft);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .item-row{
    display:grid;grid-template-columns:1fr 120px 30px;gap:8px;align-items:start;margin-bottom:8px;
  }
  .item-row textarea{resize:vertical;min-height:38px;}
  .icon-btn{
    background:none;border:1px solid var(--line);border-radius:var(--radius);
    color:var(--danger);cursor:pointer;font-size:16px;line-height:1;height:38px;
  }
  .icon-btn:hover{background:#FBEAE8;}
  .add-item{
    margin-top:4px;background:none;border:1px dashed var(--maroon-soft);color:var(--maroon);
    padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;width:100%;
  }
  .add-item:hover{background:var(--line-soft);}
  .toggle-row{display:flex;align-items:center;gap:10px;margin:2px 0 10px;}
  .toggle-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--maroon);}
  .radio-group{display:flex;gap:16px;margin:6px 0 10px;}
  .radio-group label{display:flex;align-items:center;gap:6px;font-weight:500;font-size:13px;margin:0;color:var(--ink);}
  .radio-group input{accent-color:var(--maroon);width:15px;height:15px;}
  .hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  select#whtPct{width:110px;display:inline-block;}

  .generate-row{
    position:sticky;bottom:0;
    display:flex;
    gap:10px;
    box-shadow:0 -8px 20px -6px rgba(0,0,0,.25);
  }
  .generate-btn{
    flex:1;
    background:var(--maroon);
    color:#fff;
    border:none;
    padding:16px;
    font-size:14.5px;
    font-weight:700;
    letter-spacing:.3px;
    border-radius:var(--radius);
    cursor:pointer;
    font-family:inherit;
    transition:.15s;
  }
  .generate-btn:hover{background:var(--maroon-deep);}
  .generate-btn:disabled{opacity:.6;cursor:wait;}
  .generate-btn.secondary-btn{
    background:#fff;
    color:var(--maroon);
    border:1.4px solid var(--maroon);
  }
  .generate-btn.secondary-btn:hover{background:var(--line-soft);}
  @media (max-width:480px){
    .generate-row{flex-direction:column;}
  }

  /* ---------- Document preview ---------- */
  #previewDoc{
    width:794px;
    min-height:1123px;
    background:var(--paper);
    box-shadow:0 10px 40px -12px rgba(0,0,0,.35);
    padding:56px 60px 48px;
    position:relative;
    transform-origin:top center;
    flex-shrink:0;
  }
  .doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .doc-brand .seal-lg{
    width:56px;height:56px;border-radius:50%;border:1.6px solid var(--maroon);
    display:flex;align-items:center;justify-content:center;position:relative;color:var(--maroon);
    font-family:var(--font-disp-en);font-weight:700;font-size:17px;letter-spacing:.5px;
  }
  .doc-brand .seal-lg::before{content:"";position:absolute;inset:4px;border:1px solid var(--maroon-soft);border-radius:50%;}
  .doc-brand{display:flex;gap:14px;align-items:center;}
  .doc-brand .brand-text .name{font-family:var(--font-disp-en);font-weight:700;font-size:19px;color:var(--maroon-deep);letter-spacing:.3px;}
  .doc-brand .brand-text .tag{font-size:11px;color:var(--ink-soft);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px;}
  .doc-title{text-align:right;}
  .doc-title .main{
    font-family:var(--font-disp-th),var(--font-disp-en);
    font-weight:700;
    font-size:34px;
    color:var(--maroon);
    line-height:1.1;
  }
  .doc-title .sub{font-size:12px;color:var(--ink-soft);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .doc-title .num{font-size:12.5px;color:var(--ink);margin-top:10px;}
  .doc-title .num b{color:var(--maroon-deep);}
  .hr{border:none;border-top:2px solid var(--maroon);margin:18px 0 22px;}
  .hr-thin{border:none;border-top:1px solid var(--line);margin:16px 0;}

  .parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:22px;}
  .party h4{
    margin:0 0 8px;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--maroon);
    font-weight:700;border-bottom:1px solid var(--line);padding-bottom:6px;
  }
  .party .pname{font-weight:700;font-size:14.5px;margin-bottom:3px;}
  .party .pline{font-size:12.5px;color:var(--ink);line-height:1.55;}
  .party .pline .k{color:var(--ink-soft);}

  .meta-row{display:flex;justify-content:flex-end;gap:6px;font-size:12.5px;margin-bottom:14px;}

  table.items{width:100%;border-collapse:collapse;margin-top:6px;}
  table.items thead th{
    text-align:left;font-size:11px;letter-spacing:.8px;text-transform:uppercase;
    color:#fff;background:var(--maroon);padding:9px 12px;font-weight:600;
  }
  table.items thead th.num{text-align:right;}
  table.items tbody td{
    padding:10px 12px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top;
  }
  table.items tbody td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
  table.items tbody tr:nth-child(even){background:var(--line-soft);}

  .totals{margin-top:0;width:100%;}
  .totals-inner{margin-left:auto;width:300px;font-size:13px;}
  .totals-inner .r{display:flex;justify-content:space-between;padding:6px 0;}
  .totals-inner .r.grand{
    border-top:2px solid var(--maroon);margin-top:4px;padding-top:10px;
    font-weight:700;font-size:16px;color:var(--maroon-deep);
  }
  .totals-inner .r.wht{color:var(--danger);}

  .words-band{
    width:100%;text-align:right;font-size:12.5px;font-style:italic;color:var(--ink);
    margin-top:8px;padding-top:8px;border-top:1px solid var(--line);
  }

  .payment-box{margin-top:18px;font-size:12.5px;}
  .payment-box h4{margin:0 0 6px;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--maroon);font-weight:700;}
  .payment-box .bank-line{color:var(--ink);line-height:1.6;}

  .sign-area{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:56px;}
  .sign-box{text-align:center;font-size:12px;}
  .sign-line{border-top:1px solid var(--ink);margin-bottom:8px;padding-top:8px;}
  .sign-box .role{font-weight:700;margin-bottom:26px;color:var(--maroon-deep);}
  .sign-box .date-line{margin-top:6px;color:var(--ink-soft);}

  .doc-footer{
    position:absolute;bottom:26px;left:0;right:0;text-align:center;
    font-size:9.5px;letter-spacing:1.5px;color:#c7b9b8;text-transform:uppercase;font-weight:500;
  }

  .empty-note{color:var(--ink-soft);font-style:italic;}
</style>
</head>
<body class="lang-th">

<div class="topbar">
  <div class="brandmark">
    <div class="seal">TLP</div>
    <div class="word">THE LIVING PLUS<small id="uiSubtitle">ระบบออกเอกสาร</small></div>
  </div>
  <div class="topbar-controls">
    <div class="seg" id="docTypeSeg">
      <button data-doctype="invoice" class="active" id="btnInvoice">ใบแจ้งหนี้</button>
      <button data-doctype="receipt" id="btnReceipt">ใบเสร็จ</button>
      <button data-doctype="quotation" id="btnQuotation">ใบเสนอราคา</button>
    </div>
    <div class="seg" id="langSeg">
      <button data-lang="th" class="active">ไทย</button>
      <button data-lang="en">EN</button>
      <button data-lang="zh">中文</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- ================= FORM PANE ================= -->
  <div class="form-pane">

    <div class="card">
      <h3 id="lblDocInfo">ข้อมูลเอกสาร</h3>
      <label id="lblDocNumber">เลขที่เอกสาร (เว้นว่างได้)</label>
      <input type="text" id="docNumber" placeholder="เช่น INV-2026-001">
      <label id="lblDate">วันที่</label>
      <input type="date" id="docDate">
      <div id="validUntilWrap" style="display:none">
        <label id="lblValidUntil">ใช้ได้ถึงวันที่ (ไม่บังคับ)</label>
        <input type="date" id="validUntilInput">
      </div>
    </div>

    <div class="card">
      <h3 id="lblBrandSection">โลโก้ / แบรนด์ (ไม่บังคับ)</h3>
      <div class="toggle-row">
        <input type="checkbox" id="showBrand">
        <label style="margin:0" id="lblBrandShow">แสดงโลโก้และข้อมูลแบรนด์บนเอกสาร</label>
      </div>
      <div id="brandFieldsWrap" style="display:none">
        <label id="lblBrandLogo">อัปโหลดโลโก้</label>
        <input type="file" id="brandLogoInput" accept="image/*">
        <label id="lblBrandLogoSize">ขนาดโลโก้ <span id="brandLogoSizeVal">56</span>px</label>
        <input type="range" id="brandLogoSize" min="28" max="140" step="2" value="56">
        <label id="lblBrandName">ชื่อแบรนด์</label>
        <input type="text" id="brandNameInput" value="THE LIVING PLUS">
        <label id="lblBrandSlogan">สโลแกน</label>
        <input type="text" id="brandSloganInput" value="Real Estate Advisory &amp; Brokerage">
      </div>
    </div>

    <div class="card">
      <h3 id="lblPartyA">ผู้ออกเอกสาร</h3>
      <div id="partyAFields"></div>
    </div>

    <div class="card">
      <h3 id="lblPartyB">ลูกค้า / ผู้รับเอกสาร</h3>
      <div id="partyBFields"></div>
    </div>

    <div class="card">
      <h3 id="lblItems">รายการ</h3>
      <div id="itemsFields"></div>
      <button class="add-item" id="addItemBtn">+ <span id="lblAddItem">เพิ่มรายการ</span></button>
    </div>

    <div class="card">
      <h3 id="lblWht">ภาษีหัก ณ ที่จ่าย</h3>
      <div class="radio-group" id="whtModeGroup" style="flex-direction:column;align-items:flex-start;gap:8px">
        <label><input type="radio" name="whtmode" value="none" checked> <span id="lblWhtNone">ไม่มีภาษี</span></label>
        <label><input type="radio" name="whtmode" value="deduct"> <span id="lblWhtDeduct">หัก ณ ที่จ่าย (หักออกจากยอด)</span></label>
        <label><input type="radio" name="whtmode" value="add"> <span id="lblWhtAdd">บวกเพิ่ม (เพิ่มเข้ายอด)</span></label>
      </div>
      <div id="whtPctWrap" style="display:none">
        <label id="lblWhtPct">อัตราภาษี</label>
        <select id="whtPct">
          <option value="3">3%</option>
          <option value="4">4%</option>
          <option value="5" selected>5%</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h3 id="lblPayment">ช่องทางชำระเงิน</h3>
      <div class="radio-group">
        <label><input type="radio" name="paymethod" value="transfer" checked> <span id="lblTransfer">โอนเงิน</span></label>
        <label><input type="radio" name="paymethod" value="cash"> <span id="lblCash">เงินสด</span></label>
      </div>
      <div id="bankFields">
        <label id="lblBankName">ธนาคาร</label>
        <input type="text" id="bankName" placeholder="เช่น ธนาคารกสิกรไทย">
        <div class="row2">
          <div>
            <label id="lblAccName">ชื่อบัญชี</label>
            <input type="text" id="accName" value="THE LIVING PLUS">
          </div>
          <div>
            <label id="lblAccNumber">เลขที่บัญชี</label>
            <input type="text" id="accNumber" placeholder="xxx-x-xxxxx-x">
          </div>
        </div>
      </div>
    </div>

    <div class="generate-row">
      <button class="generate-btn" id="generateBtn">
        <span id="lblGenerate">สร้างเอกสาร (PDF)</span>
      </button>
      <button class="generate-btn secondary-btn" id="generateImgBtn">
        <span id="lblGenerateImg">สร้างรูปภาพ (JPG)</span>
      </button>
    </div>
  </div>

  <!-- ================= PREVIEW PANE ================= -->
  <div class="preview-pane">
    <div class="preview-scale-box" id="previewScaleBox">
      <div id="previewDoc"></div>
    </div>
  </div>
</div>

    brandLogo:"อัปโหลดโลโก้", brandName:"ชื่อแบรนด์", brandSlogan:"สโลแกน", brandLogoSize:"ขนาดโลโก้",

/* ============================================================
   NUMBER -> THAI TEXT
   ============================================================ */
function thaiBahtText(numStr){
  let n = parseFloat(numStr || 0);
  if (isNaN(n)) n = 0;
  n = Math.round(n * 100) / 100;
  const neg = n < 0; n = Math.abs(n);
  const intPart = Math.floor(n);
  const satang = Math.round((n - intPart) * 100);

  const digits = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
  const positions = ["","สิบ","ร้อย","พัน","หมื่น","แสน"];

  function convert(numInt){
    if (numInt === 0) return "ศูนย์";
    let str = String(numInt);
    let len = str.length;
    let result = "";
    for (let i=0; i<len; i++){
      const d = parseInt(str[i]);
      const posFromRight = len - i - 1;
      const groupPos = posFromRight % 6;
      const millionGroups = Math.floor(posFromRight / 6);
      if (d !== 0){
        if (groupPos === 0 && d === 1 && len > 1 && !(millionGroups>0 && posFromRight%6===0 && i===0)){
          result += "เอ็ด";
        } else if (groupPos === 1 && d === 1){
          result += "สิบ";
        } else if (groupPos === 1 && d === 2){
          result += "ยี่สิบ";
        } else {
          result += digits[d] + positions[groupPos];
        }
      }
      if (posFromRight > 0 && posFromRight % 6 === 0){
        result += "ล้าน";
      }
    }
    return result;
  }

  let text = convert(intPart) + "บาท";
  if (satang > 0){
    text += convert(satang) + "สตางค์";
  } else {
    text += "ถ้วน";
  }
  return (neg ? "ลบ" : "") + text;
}

/* ============================================================
   NUMBER -> ENGLISH TEXT
   ============================================================ */
function englishBahtText(numStr){
  let n = parseFloat(numStr || 0);
  if (isNaN(n)) n = 0;
  n = Math.round(n * 100) / 100;
  const neg = n < 0; n = Math.abs(n);
  const intPart = Math.floor(n);
  const satang = Math.round((n - intPart) * 100);

  const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
    "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

  function threeDigits(num){
    let s = "";
    if (num >= 100){
      s += ones[Math.floor(num/100)] + " Hundred ";
      num %= 100;
    }
    if (num >= 20){
      s += tens[Math.floor(num/10)] + " ";
      num %= 10;
      if (num>0) s += ones[num] + " ";
    } else if (num > 0){
      s += ones[num] + " ";
    }
    return s.trim();
  }

  function convert(numInt){
    if (numInt === 0) return "Zero";
    const scales = [
      {v:1000000000,n:"Billion"},
      {v:1000000,n:"Million"},
      {v:1000,n:"Thousand"},
      {v:1,n:""}
    ];
    let result = "";
    let remain = numInt;
    for (const sc of scales){
      if (remain >= sc.v){
        const chunk = Math.floor(remain / sc.v);
        remain %= sc.v;
        result += threeDigits(chunk) + (sc.n ? " " + sc.n : "") + " ";
      }
    }
    return result.trim();
  }

  let text = convert(intPart) + " Baht";
  if (satang > 0){
    text += " and " + convert(satang) + " Satang";
  } else {
    text += " Only";
  }
  return (neg ? "Negative " : "") + text;
}

/* ============================================================
   NUMBER -> CHINESE TEXT (formal / 大写)
   ============================================================ */
function chineseBahtText(numStr){
  let n = parseFloat(numStr || 0);
  if (isNaN(n)) n = 0;
  n = Math.round(n * 100) / 100;
  const neg = n < 0; n = Math.abs(n);
  const intPart = Math.floor(n);
  const cents = Math.round((n - intPart) * 100);
  const jiao = Math.floor(cents / 10);
  const fen = cents % 10;

  const digits = ["零","壹","贰","叁","肆","伍","陆","柒","捌","玖"];
  const units = ["","拾","佰","仟"];
  const bigUnits = ["","万","亿","兆"];

  function convertGroup(str4){
    let result = "";
    let zeroFlag = false;
    for (let i=0; i<str4.length; i++){
      const d = parseInt(str4[i]);
      const pos = str4.length - i - 1;
      if (d === 0){
        zeroFlag = true;
      } else {
        if (zeroFlag && result !== ""){ result += "零"; }
        zeroFlag = false;
        result += digits[d] + units[pos];
      }
    }
    return result;
  }

  function convertInt(num){
    if (num === 0) return "零";
    let str = String(num);
    let groups = [];
    while (str.length > 0){
      groups.unshift(str.slice(-4));
      str = str.slice(0, -4);
    }
    let result = "";
    for (let i=0; i<groups.length; i++){
      const g = groups[i];
      const gNum = parseInt(g);
      const bigUnit = bigUnits[groups.length - 1 - i];
      if (gNum !== 0){
        if (g[0] === '0' && result !== ""){ result += "零"; }
        result += convertGroup(g) + bigUnit;
      } else if (result !== "" && i < groups.length - 1){
        result += "";
      }
    }
    return result;
  }

  let text = convertInt(intPart) + "泰铢";
  if (jiao === 0 && fen === 0){
    text += "整";
  } else {
    if (jiao > 0){
      text += digits[jiao] + "角";
    } else if (fen > 0){
      text += "零";
    }
    if (fen > 0){
      text += digits[fen] + "分";
    }
  }
  return (neg ? "负" : "") + text;
}

/* ============================================================
   HELPERS
   ============================================================ */
function fmt(n){
  n = parseFloat(n || 0);
  if (isNaN(n)) n = 0;
  return n.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
}
function subtotal(){
  return state.items.reduce((s,it)=> s + (parseFloat(it.amount)||0), 0);
}
function whtAmount(){
  return state.whtMode !== 'none' ? subtotal() * (state.whtPct/100) : 0;
}
function grandTotal(){
  if (state.whtMode === 'deduct') return subtotal() - whtAmount();
  if (state.whtMode === 'add') return subtotal() + whtAmount();
  return subtotal();
}
function formatPhone(value){
  let d = (value || '').replace(/\D/g,'').slice(0,10);
  if (d.length <= 3) return d;
  if (d.length <= 6) return d.slice(0,3) + '-' + d.slice(3);
  return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6,10);
}
function formatDate(dateStr, lang){
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const monthsTh = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const monthsEn = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const monthsZh = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  if (lang==='th') return `${d.getDate()} ${monthsTh[d.getMonth()]} ${d.getFullYear()+543}`;
  if (lang==='zh') return `${d.getFullYear()}年${monthsZh[d.getMonth()]}${d.getDate()}日`;
  return `${monthsEn[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

      renderPreview();
    });
  });

          ? `<img src="${state.brandLogo}" alt="logo" style="width:${state.brandLogoSize}px;height:${state.brandLogoSize}px;object-fit:contain;flex-shrink:0;">`
          : ``}
        <div class="brand-text">
          <div class="name">${escHtml(state.brandName)}</div>
          ${state.brandSlogan ? `<div class="tag">${escHtml(state.brandSlogan)}</div>` : ''}
        </div>
      </div>` : `<div></div>`}
      <div class="doc-title">
        <div class="main" style="font-family:${displayFont(lang)}">${titleWord}</div>
        <div class="sub">${lang!=='en' ? T.en[meta.title] : ''}</div>
        ${state.docNumber ? `<div class="num">${t[meta.numShort]}: <b>${escHtml(state.docNumber)}</b></div>` : ''}
        <div class="num">${t.date}: <b>${formatDate(state.date, lang)}</b></div>
        ${state.docType==='quotation' && state.validUntil ? `<div class="num">${t.validUntilDoc}: <b>${formatDate(state.validUntil, lang)}</b></div>` : ''}
      </div>
    </div>
    <hr class="hr">

    <div class="parties">
      ${partyBlock(labelA, state.partyA)}
      ${partyBlock(labelB, state.partyB)}
    </div>

    <table class="items">
      <thead><tr><th>${t.desc}</th><th class="num">${t.amount}</th></tr></thead>
      <tbody>${itemRows}</tbody>
    </table>

    <div class="totals">${totalsHtml}</div>
    <div class="words-band">${wordsLine}</div>

    ${paymentHtml}

    <div class="sign-area">
      <div class="sign-box">
        <div class="sign-line"></div>
        <div class="role">${signA}</div>
        <div>${t.printedName}</div>
        <div class="date-line">${t.signDate}: ____ / ____ / ____</div>
      </div>
      <div class="sign-box">
        <div class="sign-line"></div>
        <div class="role">${signB}</div>
        <div>${t.printedName}</div>
        <div class="date-line">${t.signDate}: ____ / ____ / ____</div>
      </div>
    </div>

    <div class="doc-footer">${t.footer}</div>
  `;
  scalePreview();
}

function escHtml(s){
  return (s||'').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){
  return escHtml(s).replace(/"/g,'&quot;');
}

/* ============================================================
   EXPORT: shared capture helper
   ============================================================ */
async function captureDocCanvas(){
  const node = document.getElementById('previewDoc');
  const prevTransform = node.style.transform;
  node.style.transform = 'none';
  await new Promise(r => requestAnimationFrame(r));
  try {
    const canvas = await html2canvas(node, {scale:3, backgroundColor:'#ffffff', useCORS:true});
    return canvas;
  } finally {
    node.style.transform = prevTransform;
    scalePreview();
  }
}
function exportFileName(ext){
  const typeWord = state.docType==='invoice' ? 'Invoice' : (state.docType==='receipt' ? 'Receipt' : 'Quotation');
  const numPart = state.docNumber ? state.docNumber.replace(/[^a-zA-Z0-9-]/g,'') : state.date;
  return `TheLivingPlus_${typeWord}_${numPart}.${ext}`;
}
function errorMessage(err){
  return (state.lang==='th' ? 'เกิดข้อผิดพลาด: ' : state.lang==='zh' ? '出错：' : 'Error: ') + err.message;
}

/* ============================================================
   PDF EXPORT (always a single page — image is scaled to fit
   one A4 page rather than being paginated, since the document
   is designed as a one-page layout)
   ============================================================ */
document.getElementById('generateBtn').addEventListener('click', async ()=>{
  const t = T[state.lang];
  const btn = document.getElementById('generateBtn');
  const label = document.getElementById('lblGenerate');
  const originalText = label.textContent;
  btn.disabled = true;
  label.textContent = t.generating;
  try {
    const canvas = await captureDocCanvas();
    const imgData = canvas.toDataURL('image/jpeg', 0.98);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = 210, pageH = 297;
    let imgW = pageW;
    let imgH = (canvas.height * imgW) / canvas.width;
    if (imgH > pageH){
      imgH = pageH;
      imgW = (canvas.width * imgH) / canvas.height;
    }
    const offsetX = (pageW - imgW) / 2;
    pdf.addImage(imgData, 'JPEG', offsetX, 0, imgW, imgH);
    pdf.save(exportFileName('pdf'));
  } catch(err){
    alert(errorMessage(err));
    console.error(err);
  } finally {
    btn.disabled = false;
    label.textContent = originalText;
  }
});

/* ============================================================
   JPG EXPORT
   ============================================================ */
document.getElementById('generateImgBtn').addEventListener('click', async ()=>{
  const t = T[state.lang];
  const btn = document.getElementById('generateImgBtn');
  const label = document.getElementById('lblGenerateImg');
  const originalText = label.textContent;
  btn.disabled = true;
  label.textContent = t.generatingImg;
  try {
    const canvas = await captureDocCanvas();
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const a = document.createElement('a');
    a.href = imgData;
    a.download = exportFileName('jpg');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(err){
    alert(errorMessage(err));
    console.error(err);
  } finally {
    btn.disabled = false;
    label.textContent = originalText;
  }
});

/* ============================================================
   INIT
   ============================================================ */
function fullRender(){
  renderStaticLabels();
  renderPartyFields();
  renderItemFields();
  renderPreview();
  scalePreview();
}

function scalePreview(){
  const doc = document.getElementById('previewDoc');
  const box = document.getElementById('previewScaleBox');
  if (!doc || !box) return;
  const availWidth = box.clientWidth;
  const scale = Math.min(1, availWidth / 794);
  doc.style.transform = 'scale(' + scale + ')';
  const naturalHeight = doc.scrollHeight;
  box.style.height = (naturalHeight * scale) + 'px';
}

let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(scalePreview, 120);
});

document.getElementById('docDate').value = state.date;
fullRender();
